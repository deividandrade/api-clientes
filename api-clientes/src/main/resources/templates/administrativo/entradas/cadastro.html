<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro de Entrada</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/administrativo">Home</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Formulário de Entrada -->
    <form action="/salvarEntrada" th:object="${entrada}" method="POST">

        <!-- ID -->
        <div class="mb-3">
            <label>ID</label>
            <input type="text" class="form-control bg-light" th:field="*{id}" readonly>
        </div>

        <!-- Observação -->
        <div class="mb-3">
            <label>Observação</label>
            <input type="text" class="form-control" th:field="*{obs}">
        </div>

        <!-- Funcionário -->
        <div class="mb-3">
            <label>Funcionário</label>
            <select th:field="*{funcionario}" class="form-control">
                <option th:each="f : ${listaFuncionarios}" th:value="${f.id}" th:text="${f.nome}"></option>
            </select>
        </div>

        <!-- Fornecedor -->
        <div class="mb-3">
            <label>Fornecedor</label>
            <select th:field="*{fornecedor}" class="form-control">
                <option th:each="f : ${listaFornecedores}" th:value="${f.id}" th:text="${f.nome}"></option>
            </select>
        </div>

        <!-- Quantidade Total -->
        <div class="mb-3">
            <label>Quantidade Total</label>
            <input type="text" class="form-control" readonly th:field="*{quantidadeTotal}">
        </div>

        <!-- Valor Total -->
        <div class="mb-3">
            <label>Valor Total</label>
            <input type="text" class="form-control" readonly th:field="*{valorTotal}">
        </div>

        <hr>

        <h5>Adicionar Produto</h5>

        <div th:object="${itemEntrada}">

            <!-- Produto -->
            <div class="mb-3">
                <label>Produto</label>
                <select th:field="*{produto}" class="form-control">
                    <option th:each="p : ${listaProdutos}" th:value="${p.id}" th:text="${p.nome}"></option>
                </select>
            </div>

            <!-- Quantidade -->
            <div class="mb-3">
                <label>Quantidade</label>
                <input type="text" class="form-control" th:field="*{quantidade}">
            </div>

            <!-- Valor Custo -->
            <div class="mb-3">
                <label>Valor Custo</label>
                <input type="text" class="form-control" th:field="*{valorCusto}">
            </div>

            <!-- Valor Venda (usando campo "valor") -->
            <div class="mb-3">
                <label>Valor Venda</label>
                <input type="text" class="form-control" th:field="*{valor}">
            </div>

            <!-- Botão para adicionar item -->
            <button formaction="/adicionarItem" type="submit" class="btn btn-primary">Adicionar Item</button>

        </div>

        <hr>

        <!-- Tabela de Itens -->
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Valor Custo</th>
                    <th>Valor Venda</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${listaItemEntrada}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.produto.nome}"></td>
                    <td th:text="${item.quantidade}"></td>
                    <td th:text="${item.valorCusto}"></td>
                    <td th:text="${item.valor}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(listaItemEntrada)}">
                    <td colspan="5" class="text-center text-muted">Nenhum item adicionado</td>
                </tr>
            </tbody>
        </table>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-floppy-disk"></i> Salvar
            </button>
            <a class="btn btn-danger" href="/administrativo">Voltar</a>
        </div>

    </form>

</div>

</body>
</html>
