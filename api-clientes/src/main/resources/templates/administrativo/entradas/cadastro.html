<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cadastro de Entrada</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

	<nav class="navbar navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="/administrativo">Controle de
				Entrada</a>
		</div>
	</nav>

	<div class="container mt-4">

		<form action="/salvarEntrada" th:object="${entrada}" method="POST">

			<div class="card mb-4">

				<div class="card-header bg-primary text-white">Dados da
					Entrada</div>

				<div class="card-body">

					<div class="row">

						<div class="col-md-2">
							<label>ID</label> <input type="text"
								class="form-control bg-light" th:field="*{id}" readonly>
						</div>

						<div class="col-md-5">
							<label>Funcionário</label> <select th:field="*{funcionario}"
								class="form-control">
								<option th:each="f : ${listaFuncionarios}" th:value="${f.id}"
									th:text="${f.nome}"></option>
							</select>
						</div>

						<div class="col-md-5">
							<label>Fornecedor</label> <select th:field="*{fornecedor}"
								class="form-control">
								<option th:each="f : ${listaFornecedores}" th:value="${f.id}"
									th:text="${f.nome}"></option>
							</select>
						</div>

					</div>

					<div class="row mt-3">

						<div class="col-md-6">
							<label>Observação</label> <input type="text" class="form-control"
								th:field="*{obs}">
						</div>

						<div class="col-md-3">
							<label>Quantidade Total</label> <input type="text"
								class="form-control bg-light" readonly
								th:field="*{quantidadeTotal}">
						</div>

						<div class="col-md-3">
							<label>Valor Total</label> <input type="text"
								class="form-control bg-light" readonly th:field="*{valorTotal}">
						</div>

					</div>

				</div>
			</div>

			<div class="card mb-4">

				<div class="card-header bg-secondary text-white">Adicionar
					Produto</div>

				<div class="card-body" th:object="${itemEntrada}">

					<div class="row">

						<div class="col-md-4">
							<label>Produto</label> <select th:field="*{produto}"
								class="form-control">
								<option th:each="p : ${listaProdutos}" th:value="${p.id}"
									th:text="${p.nome}"></option>
							</select>
						</div>

						<div class="col-md-2">
							<label>Quantidade</label> <input type="number"
								class="form-control" th:field="*{quantidade}">
						</div>

						<div class="col-md-3">
							<label>Valor Custo</label> <input type="number" step="0.01"
								class="form-control" th:field="*{valorCusto}">
						</div>

						<div class="col-md-3">
							<label>Valor Venda</label> <input type="number" step="0.01"
								class="form-control" th:field="*{valor}">
						</div>

					</div>

					<div class="mt-3">

						<button formaction="/adicionarItem" type="submit"
							class="btn btn-primary">

							<i class="fa-solid fa-plus"></i> Adicionar Item

						</button>

					</div>

				</div>

			</div>

			<div class="card mb-4">

				<div class="card-header bg-dark text-white">Itens da Entrada</div>

				<div class="card-body">

					<table class="table table-striped table-bordered">

						<thead class="table-dark">

							<tr>

								<th>ID</th>
								<th>Produto</th>
								<th>Quantidade</th>
								<th>Valor Custo</th>
								<th>Valor Venda</th>

							</tr>

						</thead>

						<tbody>

							<tr th:each="item : ${listaItemEntrada}">

								<td th:text="${item.id}"></td>
								<td th:text="${item.produto.nome}"></td>
								<td th:text="${item.quantidade}"></td>
								<td th:text="${item.valorCusto}"></td>
								<td th:text="${item.valor}"></td>

							</tr>

							<tr th:if="${#lists.isEmpty(listaItemEntrada)}">

								<td colspan="5" class="text-center text-muted">Nenhum item
									adicionado</td>

							</tr>

						</tbody>

					</table>

				</div>

			</div>

			<div class="text-end">

				<button type="submit" class="btn btn-success">

					<i class="fa-solid fa-floppy-disk"></i> Salvar Entrada

				</button>

				<a class="btn btn-danger" href="/administrativo"> Voltar </a>

			</div>

		</form>

	</div>

</body>
</html>
