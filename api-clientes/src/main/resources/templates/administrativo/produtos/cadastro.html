<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cadastro de Produto</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">

				<span class="navbar-toggler-icon"></span>

			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">

				<ul class="navbar-nav me-auto mb-2 mb-lg-0">

					<li class="nav-item"><a
						class="nav-link active d-flex align-items-center"
						href="index.html"> <img src="/assets/logo.png" alt="Logo"
							width="36" height="36" class="d-inline-block align-text-top">

					</a></li>

					<li class="nav-item"><a class="nav-link"
						href="/administrativo">Home</a></li>

				</ul>

				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Pesquisar">
					<button class="btn btn-outline-light" type="submit">Pesquisar</button>
				</form>

			</div>
		</div>
	</nav>

	<!-- FORMULÁRIO -->
	<div class="container mt-4">

		<form action="/salvarProduto" th:object="${produto}" method="POST">

			<h4 class="mb-4">Cadastro de Produto</h4>

			<!-- ID -->
			<div class="mb-3">
				<label for="id" class="form-label">ID</label> <input type="text"
					class="form-control bg-light" id="id" th:field="*{id}" readonly
					tabindex="-1">

			</div>

			<!-- NOME -->
			<div class="mb-3">
				<label for="nome" class="form-label">Produto</label> <input
					type="text" class="form-control" id="nome" th:field="*{nome}"
					required>

			</div>

			<!-- LINHA 1 -->
			<div class="row">

				<div class="col-md-6 mb-3">
					<label class="form-label">Código de Barras</label> <input
						type="text" class="form-control" th:field="*{codigoBarras}"
						maxlength="20" required style="text-transform: uppercase;">

				</div>

				<div class="col-md-6 mb-3">
					<label class="form-label">Unidade de Medida</label> <input
						type="text" class="form-control" th:field="*{unidadeMedida}"
						maxlength="2" required style="text-transform: uppercase;">

				</div>

			</div>

			<!-- LINHA 2 -->
			<div class="row">

				<div class="col-md-4 mb-3">
					<label class="form-label">Estoque</label> <input type="number"
						class="form-control" th:field="*{estoque}" required>

				</div>

				<div class="col-md-4 mb-3">
					<label class="form-label">Preço de Custo</label> <input
						type="number" class="form-control" step="0.01"
						th:field="*{precoCusto}" required>

				</div>

				<div class="col-md-4 mb-3">
					<label class="form-label">Preço de Venda</label> <input
						type="number" class="form-control" step="0.01"
						th:field="*{precoVenda}" required>

				</div>

			</div>

			<!-- LINHA 3 -->
			<div class="row">

				<div class="col-md-6 mb-3">
					<label class="form-label">Lucro</label> <input type="number"
						class="form-control" step="0.01" th:field="*{lucro}" required>

				</div>

				<div class="col-md-6 mb-3">
					<label class="form-label">Margem de Lucro</label> <input
						type="number" class="form-control" step="0.01"
						th:field="*{margemLucro}" required>

				</div>

			</div>

			<!-- BOTÕES -->
			<div class="mt-4 border-top pt-3">

				<button type="submit" class="btn btn-primary">

					<i class="fa-solid fa-floppy-disk"></i> Salvar

				</button>

				<a class="btn btn-danger" href="/administrativo"> <i
					class="fa-solid fa-share"></i> Voltar

				</a>

			</div>

		</form>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
