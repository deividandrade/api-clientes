<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap demo</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
	crossorigin="anonymous">
</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item"><a
						class="nav-link active d-flex align-items-center"
						aria-current="page" href="index.html"> <img
							src="/assets/logo.png" alt="Home" width="36" height="36"
							class="me-1">
					</a></li>
					<li class="nav-item"><a class="nav-link" href="#">Link</a></li>
				</ul>
				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Pesquisar" aria-label="Search">
					<button class="btn btn-outline-light" type="submit">Pesquisar</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<form action="/salvarEstado" th:object="${estado}" method="POST">

			<!-- Campo ID-->
			<div class="mb-3">
				<label for="id" class="form-label">ID:</label> <input type="text"
					class="form-control bg-light" id="id" th:field="*{id}"
					readonly="readonly" tabindex="-1"> <small
					class="text-muted"></small>
			</div>

			<!-- Campo Nome -->
			<div class="mb-3">
				<label for="nome" class="form-label">Nome Estado:</label> <input
					type="text" class="form-control" id="nome" th:field="*{nome}"
					required>
			</div>

			<!-- Campo Sigla -->
			<div class="mb-3">
				<label for="sigla" class="form-label">Sigla:</label> <input
					type="text" class="form-control" id="sigla" th:field="*{sigla}"
					maxlength="2" required style="text-transform: uppercase;">
			</div>

			<!-- Botões de Ação -->
			<div class="mt-4 border-top pt-3">
				<button type="submit" class="btn btn-primary">Salvar</button>
				<a class="btn btn-danger" href="/administrativo">Voltar</a>
			</div>

		</form>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
		crossorigin="anonymous"></script>
</body>

</html>
