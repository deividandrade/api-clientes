<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerenciamento de Estados</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.navbar-brand img {
	max-height: 40px;
}

.table-actions {
	white-space: nowrap;
	width: 1%;
}
</style>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"></link>
</head>
<body>

	<!-- Navbar Otimizada -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
		<div class="container">
			<a class="navbar-brand" href="index.html"> <img
				src="/assets/logo.png" alt="Logo" width="36" height="36"
				class="d-inline-block align-text-top"> SGE
			</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navMain">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navMain">
				<ul class="navbar-nav me-auto">
					<li class="nav-item"><a class="nav-link active" href="#">Estados</a></li>
				</ul>
				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Pesquisar estado..." aria-label="Search">
					<button class="btn btn-outline-light" type="submit">Buscar</button>
				</form>
			</div>
		</div>
	</nav>

	<!-- Conteúdo Principal -->
	<main class="container">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h2>Lista de Estados</h2>
			<a href="/cadastroEstado" class="btn btn-primary"> + Novo Estado</a>
		</div>

		<div class="card shadow-sm">
			<div class="table-responsive">
				<table class="table table-hover table-striped mb-0">
					<thead class="table-light">
						<tr>
							<th scope="col" class="ps-3">ID</th>
							<th scope="col">Nome</th>
							<th scope="col">Sigla</th>
							<th scope="col" class="text-center">Ações</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="estado : ${listarEstados}">
							<td th:text="${estado.id}" class="ps-3 fw-bold">1</td>
							<td th:text="${estado.nome}">São Paulo</td>
							<td><span class="badge bg-secondary"
								th:text="${estado.sigla}">SP</span></td>
							<td class="text-center table-actions"><a
								th:href="@{/editarEstado/{id}(id=${estado.id})}"><i
									class="fa-solid fa-pen-to-square"
									style="color: rgb(13, 110, 253);"></i></a> <a
								th:href="@{/removerEstado/{id}(id=${estado.id})}"
								onclick="return confirm('Tem certeza que deseja excluir?')"><i
									class="fa-solid fa-trash" style="color: rgb(220, 53, 69);"></i></a>
							</td>
						</tr>
						<!-- Caso a lista esteja vazia -->
						<tr th:if="${#lists.isEmpty(listarEstados)}">
							<td colspan="4" class="text-center text-muted py-4">Nenhum
								estado cadastrado.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
