<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap demo</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
	crossorigin="anonymous">

<!-- Font Awesome -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
	integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

	<!-- ===================== NAVBAR ===================== -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">

				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">

				<ul class="navbar-nav me-auto mb-2 mb-lg-0">

					<li class="nav-item"><a
						class="nav-link active d-flex align-items-center"
						aria-current="page" href="index.html"> <img
							src="/assets/logo.png" alt="Logo" width="36" height="36"
							class="d-inline-block align-text-top">
					</a></li>

					<a class="nav-link" href="/administrativo">Home</a>

				</ul>

				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Pesquisar" aria-label="Search">

					<button class="btn btn-outline-light" type="submit">
						Pesquisar</button>
				</form>

			</div>
		</div>
	</nav>


	<!-- ===================== FORMULÁRIO ===================== -->
	<div class="container mt-4">

		<form action="/salvarCliente" th:object="${cliente}" method="POST">

			<!-- ID -->
			<div class="mb-3">
				<label for="id" class="form-label">ID:</label> <input type="text"
					class="form-control bg-light" id="id" th:field="*{id}"
					readonly="readonly" tabindex="-1">
			</div>


			<!-- Funcionário -->
			<div class="mb-3">
				<label for="nome" class="form-label">Funcionário:</label> <input
					type="text" class="form-control" id="nome" th:field="*{nome}"
					required>
			</div>


			<!-- CPF -->
			<div class="mb-3">
				<label for="cpf" class="form-label">CPF:</label> <input type="text"
					class="form-control" id="cpf" th:field="*{cpf}"
					placeholder="000.000.000-00" required>
			</div>


			<!-- Telefone -->
			<div class="mb-3">
				<label for="telefone" class="form-label">Telefone:</label> <input
					type="text" class="form-control" id="telefone"
					th:field="*{telefone}" placeholder="(00) 9 0000-0000" required>
			</div>


			<!-- Email -->
			<div class="mb-3">
				<label for="email" class="form-label">E-mail:</label> <input
					type="text" class="form-control" id="email" th:field="*{email}"
					required>
			</div>


			<!-- Endereço -->
			<div class="mb-3">
				<label for="endereco" class="form-label">Endereço:</label> <input
					type="text" class="form-control" id="endereco"
					th:field="*{endereco}" required>
			</div>


			<!-- Número -->
			<div class="mb-3">
				<label for="numero" class="form-label">Número:</label> <input
					type="text" class="form-control" id="numero" th:field="*{numero}"
					required>
			</div>


			<!-- Bairro -->
			<div class="mb-3">
				<label for="bairro" class="form-label">Bairro:</label> <input
					type="text" class="form-control" id="bairro" th:field="*{bairro}"
					required>
			</div>


			<!-- Cidade -->
			<div class="mb-3">
				<label>Cidade:</label> <select th:field="*{cidade}"
					class="form-control">

					<option th:each="est : ${listaCidades}" th:value="${est.id}"
						th:text="${est.nome}"></option>

				</select>
			</div>


			<!-- BOTÕES -->
			<div class="mt-4 border-top pt-3">

				<button type="submit" class="btn btn-primary">
					<i class="fa-solid fa-floppy-disk"></i> Salvar
				</button>

				<a class="btn btn-danger" href="/administrativo"> <i
					class="fa-solid fa-share"></i> Voltar
				</a>

			</div>

		</form>

	</div>


	<!-- ===================== SCRIPTS ===================== -->

	<!-- jQuery -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

	<!-- Plugin máscara -->
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

	<script>
		$(function() {

			$('input[name="cpf"]').mask('000.000.000-00');
			$('input[name="telefone"]').mask('(00) 0 0000-0000');

		});
	</script>

</body>
</html>
