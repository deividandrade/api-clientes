<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap demo</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
	crossorigin="anonymous">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
	integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item"><a
						class="nav-link active d-flex align-items-center"
						aria-current="page" href="index.html"> <img
							src="/assets/logo.png" alt="Logo" width="36" height="36"
							class="d-inline-block align-text-top">
					</a></li>
					<a class="nav-link" href="/administrativo">Home</a>

				</ul>
				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Pesquisar" aria-label="Search">
					<button class="btn btn-outline-light" type="submit">Pesquisar</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<form action="/salvarCidade" th:object="${cidade}" method="POST">

			<!-- Campo ID-->
			<div class="mb-3">
				<label for="id" class="form-label">ID:</label> <input type="text"
					class="form-control bg-light" id="id" th:field="*{id}"
					readonly="readonly" tabindex="-1"> <small
					class="text-muted"></small>
			</div>

			<!-- Campo Nome -->
			<div class="mb-3">
				<label for="nome" class="form-label">Nome Cidade:</label> <input
					type="text" class="form-control" id="nome" th:field="*{nome}"
					required>
			</div>

			<!-- Campo Sigla -->
			<div class="mb-3">
				<label class="form-label">CEP:</label> <input type="text"
					class="form-control" id="cep" th:field="*{cep}" maxlength="9"
					required style="text-transform: uppercase;">
			</div>

			<label>Estado:</label> <select th:field="*{estado}"
				class="form-control">
				<option th:each="est : ${listaEstados}" th:value="${est.id}"
					th:text="${est.nome}"></option>
			</select>


			<!-- Botões de Ação -->
			<div class="mt-4 border-top pt-3">
				<button type="submit" class="btn btn-primary">
					<i class="fa-solid fa-floppy-disk"></i> Salvar
				</button>
				<a class="btn btn-danger" href="/administrativo"> <i
					class="fa-solid fa-share"></i> Voltar
				</a>
			</div>

		</form>
	</div>

	<!-- 1. jQuery -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

	<!-- 2. Plugin de Máscara -->
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

	<!-- 3. Seu script -->
	<script>
		$(document).ready(function() {
			$('#cep').mask('00.000-000');
		});
	</script>



</body>

</html>
