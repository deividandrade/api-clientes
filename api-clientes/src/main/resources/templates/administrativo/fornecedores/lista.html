<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerenciamento de Fornecedores</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link rel="stylesheet"
	href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.css">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

<style>
.navbar-brand img {
	max-height: 40px;
}

.table-actions {
	white-space: nowrap;
	width: 1%;
}
</style>

</head>

<body>

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">

		<div class="container">

			<a class="navbar-brand" href="#"> <img src="/assets/logo.png"
				alt="Logo" width="36" height="36"
				class="d-inline-block align-text-top">
			</a>

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navMain">

				<span class="navbar-toggler-icon"></span>

			</button>

			<div class="collapse navbar-collapse" id="navMain">

				<ul class="navbar-nav me-auto">

					<li class="nav-item"><a class="nav-link"
						href="/administrativo">Home</a></li>

				</ul>

			</div>
		</div>
	</nav>


	<!-- Conteúdo -->
	<main class="container">

		<div class="d-flex justify-content-between align-items-center mb-3">

			<h2>Lista de Fornecedores</h2>

			<a href="/cadastroFornecedor" class="btn btn-primary"> + Novo
				Fornecedor </a>

		</div>


		<div class="card shadow-sm">
			<div class="card-body">

				<div class="table-responsive">

					<table class="table table-hover table-striped align-middle"
						id="tabela">

						<thead class="table-light">

							<tr>

								<th class="ps-3">ID</th>
								<th>Fornecedor</th>
								<th>CNPJ</th>
								<th>Telefone</th>
								<th>E-mail</th>
								<th>Endereço</th>
								<th>Número</th>
								<th>Bairro</th>
								<th>Cidade</th>
								<th class="text-center">Ações</th>

							</tr>

						</thead>


						<tbody>

							<tr th:each="fornecedor : ${listarFornecedores}">

								<td class="ps-3 fw-bold" th:text="${fornecedor.id}">1</td>

								<td th:text="${fornecedor.nome}">Nome</td>

								<td th:text="${fornecedor.cnpj}">00.000.000/0000-00</td>

								<td th:text="${fornecedor.telefone}">(00) 90000-0000</td>

								<td th:text="${fornecedor.email}">email@email.com</td>

								<td th:text="${fornecedor.endereco}">Rua exemplo</td>

								<td th:text="${fornecedor.numero}">123</td>

								<td th:text="${fornecedor.bairro}">Centro</td>

								<td th:text="${fornecedor.cidade.nome}">Cidade</td>


								<td class="text-center table-actions"><a
									th:href="@{/editarFornecedor/{id}(id=${fornecedor.id})}"
									title="Editar"> <i
										class="fa-solid fa-pen-to-square text-primary"></i>

								</a> <a th:href="@{/removerFornecedor/{id}(id=${fornecedor.id})}"
									onclick="return confirm('Tem certeza que deseja excluir?')"
									title="Excluir"> <i class="fa-solid fa-trash text-danger"></i>

								</a></td>

							</tr>


							<tr th:if="${#lists.isEmpty(listarFornecedores)}">

								<td colspan="11" class="text-center text-muted py-4">

									Nenhum fornecedor cadastrado.</td>

							</tr>

						</tbody>

					</table>

				</div>

			</div>
		</div>


		<div class="mt-3 mb-5">

			<a class="btn btn-primary" href="/cadastroFornecedor"> <i
				class="fa-solid fa-book"></i> Cadastrar
			</a> <a class="btn btn-danger" href="/administrativo"> <i
				class="fa-solid fa-share"></i> Voltar
			</a>

		</div>

	</main>


	<!-- Scripts -->

	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

	<script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>

	<script
		src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.js"></script>


	<script>
		$(document)
				.ready(
						function() {

							new DataTable(
									'#tabela',
									{

										layout : {
											topStart : 'pageLength',
											topEnd : 'search',
											bottomStart : 'info',
											bottomEnd : 'paging'
										},

										language : {
											url : 'https://cdn.datatables.net/plug-ins/2.0.8/i18n/pt-BR.json'
										}

									});

						});
	</script>

</body>
</html>
