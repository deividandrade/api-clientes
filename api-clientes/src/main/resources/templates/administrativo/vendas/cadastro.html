<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro de Venda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container mt-4">
        <form th:action="@{/venda/salvarVenda}" th:object="${venda}" method="post">

            <!-- Dados da Venda -->
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">Dados da Venda</div>
                <div class="card-body">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label>Funcionário</label>
                            <select th:field="*{funcionario}" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option th:each="f : ${listaFuncionarios}" th:value="${f.id}" th:text="${f.nome}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label>Cliente</label>
                            <select th:field="*{cliente}" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option th:each="c : ${listaClientes}" th:value="${c.id}" th:text="${c.nome}"></option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label>Observação</label>
                            <input type="text" th:field="*{obs}" class="form-control" placeholder="Ex: entrega rápida" />
                        </div>

                        <div class="col-md-6">
                            <label>Quantidade Total</label>
                            <input type="text" th:field="*{quantidadeTotal}" class="form-control" readonly />
                        </div>

                        <div class="col-md-6">
                            <label>Valor Total</label>
                            <input type="text" th:field="*{valorTotal}" class="form-control" readonly />
                        </div>

                    </div>
                </div>
            </div>

            <!-- Adicionar Item -->
            <div class="card mb-3" th:object="${itemVenda}">
                <div class="card-header bg-secondary text-white">Adicionar Produto</div>
                <div class="card-body">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label>Produto</label>
                            <select th:field="*{produto}" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option th:each="p : ${listaProdutos}" th:value="${p.id}" th:text="${p.nome}"></option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label>Quantidade</label>
                            <input type="number" th:field="*{quantidade}" min="1" class="form-control" required />
                        </div>

                        <div class="col-md-3">
                            <button type="submit" th:formaction="@{/venda/adicionarItem}" class="btn btn-primary w-100">
                                Adicionar Item
                            </button>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Lista de Itens -->
            <div class="card mb-3">
                <div class="card-header bg-dark text-white">Itens da Venda</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Produto</th>
                                <th>Quantidade</th>
                                <th>Valor Unit.</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${listaItemVenda}">
                                <td th:text="${item.produto.nome}"></td>
                                <td th:text="${item.quantidade}"></td>
                                <td th:text="${item.valor}"></td>
                                <td th:text="${item.quantidade * item.valor}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(listaItemVenda)}">
                                <td colspan="4" class="text-center text-muted">Nenhum item adicionado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="text-end mb-5">
                <button type="submit" class="btn btn-success">Salvar Venda</button>
            </div>
        </form>
    </div>
</body>

</html>
